<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <title>Contact Us - Online Food Shop</title>
</head>
<body>
    <section id="contact-section">
        <h1>Contact Us</h1>
        <form action="#">
            <div class="form-group">
                <label for="query-type">Type of Query</label>
                <select name="queryType" id="query-type">
                    <option value="none" selected>Select</option>
                    <option value="order">Order Related Issues</option>
                    <option value="site">Site Related Issues</option>
                    <option value="complaint">Complaint</option>
                    <option value="other">Other</option>
                </select>
            </div>
            <div class="form-group">
                <label for="input-name">Name</label>
                <input type="text" name="name" id="input-name" placeholder="Enter your name">
            </div>
            <div class="form-group">
                <label for="input-email">Email</label>
                <input type="email" name="email" id="input-email" placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label for="input-phone">Phone Number</label>
                <input type="tel" name="phone" id="input-phone" placeholder="Enter your phone number">
            </div>
            <div id="membership-info">
                Are you a member of Online Food Shop?
                Yes <input type="radio" name="membership" value="yes">
                No <input type="radio" name="membership" value="no">
            </div>
            <div class="form-group">
                <label for="message-text">Explain your query</label>
                <textarea name="message" id="message-text" cols="30" rows="10"></textarea>
            </div>
            <input type="submit" value="Submit">
            <input type="reset" value="Reset">
        </form>
    </section>
</body>
</html>
